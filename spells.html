<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="ASSETS/IMG/LogoPestaña.webp" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="CSS/Style.css">

    <title>D&D Spells</title>
</head>
<body class="dark">

    <nav class="navbar navbar-expand-sm">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="classes.html">Classes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="spells.html">Spells</a>
                </li>
            </ul>
        </div>
    </nav>

    <main>

        <!-- CONTROLS BAR -->
        <section class="spells-controls-bar px-4 py-3">

            <!-- LEFT: Sort buttons -->
            <div class="spells-control-group">
                <span class="control-label">Sort by</span>
                <button class="filter active" data-sort="level" data-sort-dir="asc">Level</button>
                <button class="filter" data-sort="name"  data-sort-dir="asc">A – Z</button>
            </div>

            <!-- CENTER: Level filter -->
            <div class="spells-control-group">
                <span class="control-label">Level</span>
                <button class="filter active" data-filter-type="level" data-filter="*">All</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-0">Cantrip</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-1">1st</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-2">2nd</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-3">3rd</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-4">4th</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-5">5th</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-6">6th</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-7">7th</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-8">8th</button>
                <button class="filter" data-filter-type="level" data-filter=".spell-lvl-9">9th</button>
            </div>

            <!-- RIGHT: School filter -->
            <div class="spells-control-group">
                <span class="control-label">School</span>
                <button class="filter active" data-filter-type="school" data-filter="*">All</button>
                <button class="filter" data-filter-type="school" data-filter=".school-abjuration">Abjuration</button>
                <button class="filter" data-filter-type="school" data-filter=".school-conjuration">Conjuration</button>
                <button class="filter" data-filter-type="school" data-filter=".school-divination">Divination</button>
                <button class="filter" data-filter-type="school" data-filter=".school-enchantment">Enchantment</button>
                <button class="filter" data-filter-type="school" data-filter=".school-evocation">Evocation</button>
                <button class="filter" data-filter-type="school" data-filter=".school-illusion">Illusion</button>
                <button class="filter" data-filter-type="school" data-filter=".school-necromancy">Necromancy</button>
                <button class="filter" data-filter-type="school" data-filter=".school-transmutation">Transmutation</button>
            </div>

        </section>

        <!-- SPELLS LIST -->
        <section class="container-fluid px-4 py-3">

            <!-- Table header (static, always visible) -->
            <div class="spells-table-header">
                <div class="col-school">School</div>
                <div class="col-level">Level</div>
                <div class="col-name">Name</div>
                <div class="col-casting">Casting Time</div>
                <div class="col-components">Components</div>
                <div class="col-chevron"></div>
            </div>

            <!-- Isotope container -->
            <div id="spellsCont">
                <!-- Rows injected by listSpells.js -->
                <div id="spells-loading" class="text-center py-5">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 text-muted small">Loading spells… this may take a moment.</p>
                </div>
            </div>

        </section>

    </main>

    <!-- JQUERY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmM1HYW9bSwBpKJy9xEZMn3RfI1" crossorigin="anonymous"></script>
    <!-- ISOTOPE -->
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>

    <!-- SPELLS SCRIPTS -->
    <script src="js/listSpells.js"></script>
    <script src="js/SpellsScript.js"></script>

</body>
</html>
