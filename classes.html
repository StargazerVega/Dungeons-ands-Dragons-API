<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="ASSETS/IMG/LogoPestaña.webp" />
    
    <link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <!-- CSS LINK -->
    <link rel="stylesheet" href="CSS/Style.css">
    
    <title>D&D Classes</title>

</head>
<body class="dark">
    <nav class="navbar navbar-expand-sm">
        <div class="container-fluid">
            <!-- Links -->
            <ul class="navbar-nav">
            <li class="nav-item">
                <a class="" href="index.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="classes.html">Classes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="spells.html">Spells</a>
            </li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="btns-cont m-4">
            <button class="filter" data-filter="*">All</button>
            <button class="filter" data-filter=".martial">Martial</button>
            <button class="filter" data-filter=".caster">Caster</button>
            <button class="filter" data-filter=".half-caster">Half-caster</button>
        </section>

        <section class="container py-5">
            <div id="classesCont" class="row justify-content-center g-4 d-flex">
                <!-- Espacio para cargar las clases -->

                    <div class="classes col-2">
                        <div class="card">
                            <img src="/ASSETS/IMG/BarbarianIMG.png" class="card-img-top" alt="BarbarianIMG">
                            <div class="card-img-overlay">
                                <h5 class="card-title">${name}</h5>
                                <p class="card-text"><span class="class-hitDie">${hitDie}</span></p>
                                <p class="card-text"><span class="class-Proficiency-1">${saveProficiency1}</span> & <span></span class="class-Proficiency-1">${saveProficiency2}></p>
                                <a href="#" class="btn selectClassBtn">Select class</a>
                            </div>
                        </div>
                    </div>
                    

                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </section>

        <section class="levelUpCont py-5">
            <div class="">

            </div>
            <div>

            </div>
            <div>

            </div>
        </section>
    </main>

    <!-- JQUERY -->
    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>

    <!-- ISOTOPE  -->
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>

    <!-- API CALL SCRIPT -->
    <script src="js/listClasses.js"></script>

    <!-- MI PROPIO JS -->
    <script src="js/Script.js"></script>
</body>
</html>
