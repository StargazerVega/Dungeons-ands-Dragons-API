    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="CSS/Style.css">
    
    <title>D&D Classes</title>
</head>
<body class="dark">
    <nav class="navbar-static">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="ASSETS/IMG/Index/LogoPestaña.webp" alt="D&D Logo" class="LogoVuelta">
            </a>
            <ul class="nav-links">
                <li><a href="classes.html">Classes</a></li>
                <li><a href="spells.html">Spells</a></li>
            </ul>
            <button id="themeToggle" class="theme-toggle-btn">
           ☀️ Light Mode
       </button>
            <button class="hamburger" id="hamburger" aria-label="Open menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="classes.html">Classes</a>
            <a href="spells.html">Spells</a>
        </div>
        </div>
    </nav>

    <main>
        <!-- Filtros -->
        <section class="btns-cont m-4">
            <button class="filter active" data-filter="*">All</button>
            <button class="filter" data-filter=".martial">Martial</button>
            <button class="filter" data-filter=".caster">Caster</button>
            <button class="filter" data-filter=".half-caster">Half-caster</button>
        </section>

        <!-- Tarjetas -->
        <section class="container-fluid py-4">
            <div id="classesCont" class="row justify-content-center g-4">
                <!-- JS limpia este spinner e inyecta las tarjetas -->
                <div class="col-12 text-center py-5" id="loadingSpinner">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 ">Loading classes...</p>
                </div>
            </div>
        </section>

        <!-- Sección de detalles de clase-->
        <section class="levelUpCont py-3">
            <!--Detalles de clase inyectados por el JS-->
        </section>
    </main>

    <!-- JQUERY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" referrerpolicy="no-referrer"></script>
